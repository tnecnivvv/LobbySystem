# Player Profile Settings

# Initial network level for new players (default: 0)
networklevel: 0

# Starting network rank for players (default: 'Player')
networkrank: Player

# Starting balance of universal network coins (default: 1000)
sushi: 1000

# Terms of Service agreement status (default: false, player must accept)
termsofservice: false

# Default language for the player (default: 'en_US' - English)
language: en_US